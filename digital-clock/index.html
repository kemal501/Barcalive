<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Global Time Display</h1>
            <p>Real-time clocks across different time zones</p>
        </header>

        <div class="controls">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search timezone (e.g., 'New York', 'London')"
                class="search-box"
            >
            <div class="button-group">
                <button id="addTimezoneBtn" class="btn btn-primary">+ Add Timezone</button>
                <button id="resetBtn" class="btn btn-secondary">Reset</button>
            </div>
        </div>

        <div id="timezoneModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add Timezone</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <input 
                        type="text" 
                        id="timezoneSearch" 
                        placeholder="Search timezones..."
                        class="search-input"
                    >
                    <div id="timezoneList" class="timezone-list"></div>
                </div>
            </div>
        </div>

        <div id="clocksContainer" class="clocks-container">
            <!-- Clock cards will be inserted here -->
        </div>

        <footer>
            <p>Created with ❤️ | Displays current time in real-time</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
